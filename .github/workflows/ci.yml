name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.12.1"
  RUST_VERSION: "1.97.1"

jobs:
  check:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release checks
        run: pnpm check

      - name: Run required browser demo regression checks
        env:
          DEMO_FLOW_REQUIRE_BROWSER: "1"
          PLAYWRIGHT_BROWSER_EXECUTABLE: /usr/bin/google-chrome
        run: |
          test -x "$PLAYWRIGHT_BROWSER_EXECUTABLE"
          "$PLAYWRIGHT_BROWSER_EXECUTABLE" --version
          pnpm test:demo-flow
          pnpm test:session-activation

      - name: Check Ubuntu deb and Flatpak packaging contract
        run: pnpm check:linux

      - name: Check Wiki sources
        run: pnpm check:wiki
