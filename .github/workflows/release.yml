name: Release installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated vX.Y.Z tag to release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  NODE_VERSION: "22"
  PNPM_VERSION: "10.12.1"
  RUST_VERSION: "1.97.1"

jobs:
  prepare:
    name: Verify release tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
      commit: ${{ steps.metadata.outputs.commit }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - name: Check out annotated tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Install Linux Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Verify annotated tag and version contract
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          metadata="$RUNNER_TEMP/release-metadata.json"
          node scripts/verify-release.mjs --tag "$RELEASE_TAG" --output "$metadata"
          {
            echo "tag=$(jq -r .tag "$metadata")"
            echo "version=$(jq -r .version "$metadata")"
            echo "commit=$(jq -r .commit "$metadata")"
            echo "prerelease=$(jq -r .prerelease "$metadata")"
          } >> "$GITHUB_OUTPUT"

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run shared release gate
        run: |
          pnpm check:release-scripts
          pnpm check

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata
          path: ${{ runner.temp }}/release-metadata.json
          if-no-files-found: error
          retention-days: 30

  windows:
    name: Windows 10+ x64 unsigned installer
    needs: prepare
    runs-on: windows-2022
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      FFMPEG_URL: https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-win32-x64
      FFMPEG_SHA256: 04e1307997530f9cf2fe35cba2ca7e8875ca91da02f89d6c7243df819c94ad00
      FFMPEG_LICENSE_URL: https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/win32-x64.LICENSE
      FFMPEG_LICENSE_SHA256: 8ceb4b9ee5adedde47b31e975c1d90c73ad27b6b165a1dcd80c7c545eb65b903
      FFMPEG_NOTICE_URL: https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/win32-x64.README
      FFMPEG_NOTICE_SHA256: a636a7183c58006351acbaf35303c0ed85c6e1320fd4e80de453ba6157de6311
      FFMPEG_BUILD_ID: ffmpeg-static-b6.1.1-gyan-6.1.1-essentials
      WEBVIEW2_URL: https://msedge.sf.dl.delivery.mp.microsoft.com/filestreamingservice/files/5a16eb19-26ed-4f1b-996e-b438848bb74a/MicrosoftEdgeWebView2RuntimeInstallerX64.exe
      WEBVIEW2_SHA256: 9915c97304977e2d11877b03e07a7fcdd10d4277b2297c5a5113d414fc6ae6b3
    steps:
      - name: Check out release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Reverify release checkout
        run: node scripts/verify-release.mjs --tag "$env:RELEASE_TAG"
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage reviewed offline WebView2 installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:WEBVIEW2_URL) -or
              [string]::IsNullOrWhiteSpace($env:WEBVIEW2_SHA256)) {
            throw "Missing WEBVIEW2_WINDOWS_X64_URL or WEBVIEW2_WINDOWS_X64_SHA256 variable"
          }
          $reviewedUri = [Uri]$env:WEBVIEW2_URL
          $expectedPrefix = "https://msedge.sf.dl.delivery.mp.microsoft.com/filestreamingservice/files/"
          if (-not $reviewedUri.AbsoluteUri.StartsWith($expectedPrefix, [StringComparison]::OrdinalIgnoreCase)) {
            throw "WEBVIEW2_WINDOWS_X64_URL must be an exact Microsoft filestreamingservice HTTPS URL"
          }
          $segments = $reviewedUri.AbsolutePath.Trim("/").Split("/")
          if ($segments.Count -lt 2) { throw "Pinned WebView2 URL has no GUID/file path" }
          $guid = $segments[$segments.Count - 2]
          $fileName = [Uri]::UnescapeDataString($segments[$segments.Count - 1])
          $parsedGuid = [Guid]::Empty
          if (-not [Guid]::TryParse($guid, [ref]$parsedGuid) -or [string]::IsNullOrWhiteSpace($fileName)) {
            throw "Pinned WebView2 URL has an invalid GUID or file name"
          }
          $cache = Join-Path $env:GITHUB_WORKSPACE "src-tauri\target\.tauri\x64\$guid"
          New-Item -ItemType Directory -Force -Path $cache | Out-Null
          $installer = Join-Path $cache $fileName
          Invoke-WebRequest -Uri $reviewedUri -OutFile $installer
          $actualHash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:WEBVIEW2_SHA256.ToLowerInvariant()) {
            throw "Reviewed WebView2 SHA-256 mismatch"
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $installer
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid -or
              -not $signature.SignerCertificate.Subject.Contains("Microsoft")) {
            throw "Reviewed WebView2 installer does not have a valid Microsoft signature"
          }

      - name: Download and stage reviewed Windows FFmpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $required = @(
            "FFMPEG_URL",
            "FFMPEG_SHA256",
            "FFMPEG_LICENSE_URL",
            "FFMPEG_LICENSE_SHA256",
            "FFMPEG_NOTICE_URL",
            "FFMPEG_NOTICE_SHA256",
            "FFMPEG_BUILD_ID"
          )
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing pinned release input: $name"
            }
          }
          if (([Uri]$env:FFMPEG_URL).Scheme -ne "https" -or
              ([Uri]$env:FFMPEG_LICENSE_URL).Scheme -ne "https" -or
              ([Uri]$env:FFMPEG_NOTICE_URL).Scheme -ne "https") {
            throw "FFmpeg binary, license, and notice URLs must use HTTPS"
          }
          $dependencyRoot = Join-Path $env:RUNNER_TEMP "ffmpeg-reviewed"
          New-Item -ItemType Directory -Path $dependencyRoot | Out-Null
          $binary = Join-Path $dependencyRoot "ffmpeg.exe"
          $license = Join-Path $dependencyRoot "FFmpeg-LICENSE.txt"
          $notice = Join-Path $dependencyRoot "FFmpeg-BUILD-README.txt"
          Invoke-WebRequest -Uri $env:FFMPEG_URL -OutFile $binary
          Invoke-WebRequest -Uri $env:FFMPEG_LICENSE_URL -OutFile $license
          Invoke-WebRequest -Uri $env:FFMPEG_NOTICE_URL -OutFile $notice
          $licenseHash = (Get-FileHash -LiteralPath $license -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($licenseHash -ne $env:FFMPEG_LICENSE_SHA256.ToLowerInvariant()) {
            throw "Reviewed FFmpeg license SHA-256 mismatch"
          }
          $noticeHash = (Get-FileHash -LiteralPath $notice -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($noticeHash -ne $env:FFMPEG_NOTICE_SHA256.ToLowerInvariant()) {
            throw "Reviewed FFmpeg build notice SHA-256 mismatch"
          }
          .\scripts\stage-ffmpeg.ps1 `
            -Source $binary `
            -ExpectedSha256 $env:FFMPEG_SHA256 `
            -LicenseFile @($license, $notice) `
            -SourceUrl $env:FFMPEG_URL `
            -BuildId $env:FFMPEG_BUILD_ID `
            -ReviewedPortable

      - name: Create unsigned Windows bundle configuration
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $config = [ordered]@{
            bundle = [ordered]@{
              useLocalToolsDir = $true
            }
          }
          $configPath = Join-Path $env:RUNNER_TEMP "tauri-release-unsigned.json"
          [IO.File]::WriteAllText($configPath, (($config | ConvertTo-Json -Depth 5) + "`n"))

      - name: Build unsigned offline NSIS installer
        run: pnpm tauri build --ci --bundles nsis --no-sign --config "$env:RUNNER_TEMP\tauri-release-unsigned.json"

      - name: Verify unsigned state, install, launch, resources, and uninstall
        shell: pwsh
        run: |
          .\scripts\verify-release-windows.ps1 `
            -Version "${{ needs.prepare.outputs.version }}" `
            -Tag "${{ needs.prepare.outputs.tag }}" `
            -Commit "${{ needs.prepare.outputs.commit }}" `
            -WebView2Url "$env:WEBVIEW2_URL" `
            -WebView2Sha256 "$env:WEBVIEW2_SHA256" `
            -OutputDirectory "$env:RUNNER_TEMP\release-assets"

      - name: Attest Windows installer provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release-assets/DOHC-Viewer_${{ needs.prepare.outputs.version }}_UNSIGNED_windows-x64-setup.exe

      - name: Upload verified Windows release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows-x64
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error
          retention-days: 30

  macos:
    name: macOS 12+ ${{ matrix.architecture }} unsigned DMG
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            architecture: x64
            target: x86_64-apple-darwin
    env:
      FFMPEG_SOURCE_URL: https://codeload.github.com/FFmpeg/FFmpeg/tar.gz/refs/tags/n8.1.2
      FFMPEG_SOURCE_SHA256: 9fd092511605bbebafe095ea6d38d9e40f34d12f7386e1258372df8be0576eb7
      FFMPEG_SOURCE_REVISION: 38b88335f99e76ed89ff3c93f877fdefce736c13
      FFMPEG_BUILD_ID: ffmpeg-8.1.2-dohc-minimal-lgpl
    steps:
      - name: Check out release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust target
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Reverify release checkout
        run: node scripts/verify-release.mjs --tag "$RELEASE_TAG"
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and stage reviewed macOS FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          source_archive="$RUNNER_TEMP/ffmpeg-n8.1.2.tar.gz"
          curl \
            --fail \
            --location \
            --proto '=https' \
            --tlsv1.2 \
            --silent \
            --show-error \
            "$FFMPEG_SOURCE_URL" \
            --output "$source_archive"
          bash scripts/build-ffmpeg-macos.sh \
            --source-archive "$source_archive" \
            --expected-source-sha256 "$FFMPEG_SOURCE_SHA256" \
            --source-url "$FFMPEG_SOURCE_URL" \
            --source-revision "$FFMPEG_SOURCE_REVISION" \
            --build-id "$FFMPEG_BUILD_ID"

      - name: Build ad-hoc-sealed app and headless DMG
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          set -euo pipefail
          pnpm tauri build --ci --target "${{ matrix.target }}" --bundles app --no-sign
          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle"
          app_count="$(find "$bundle_root/macos" -maxdepth 1 -type d -name '*.app' | wc -l | tr -d ' ')"
          [[ "$app_count" == "1" ]] || { echo "Expected one app bundle, found $app_count" >&2; exit 1; }
          app="$(find "$bundle_root/macos" -maxdepth 1 -type d -name '*.app' -print)"
          bash scripts/seal-macos-app-adhoc.sh --app "$app"
          mkdir -p "$bundle_root/dmg"
          bash scripts/make-dmg.sh \
            --app "$app" \
            --output "$bundle_root/dmg/DOHC-Viewer_${{ needs.prepare.outputs.version }}_${{ matrix.architecture }}.dmg"

      - name: Verify ad-hoc seal, Gatekeeper state, DMG, resources, and startup
        shell: bash
        run: |
          bash scripts/verify-release-macos.sh \
            --target "${{ matrix.target }}" \
            --arch "${{ matrix.architecture }}" \
            --version "${{ needs.prepare.outputs.version }}" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --commit "${{ needs.prepare.outputs.commit }}" \
            --output "$RUNNER_TEMP/release-assets"

      - name: Attest macOS installer provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release-assets/DOHC-Viewer_${{ needs.prepare.outputs.version }}_UNSIGNED_macos-${{ matrix.architecture }}.dmg

      - name: Upload verified macOS release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos-${{ matrix.architecture }}
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error
          retention-days: 30

  linux_deb:
    name: Ubuntu 22.04+ x86_64 unsigned deb
    needs: prepare
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      FFMPEG_SOURCE_URL: https://codeload.github.com/FFmpeg/FFmpeg/tar.gz/refs/tags/n8.1.2
      FFMPEG_SOURCE_SHA256: 9fd092511605bbebafe095ea6d38d9e40f34d12f7386e1258372df8be0576eb7
      FFMPEG_SOURCE_REVISION: 38b88335f99e76ed89ff3c93f877fdefce736c13
      FFMPEG_BUILD_ID: ffmpeg-8.1.2-dohc-minimal-lgpl
    steps:
      - name: Check out release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Linux build and smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            dbus-x11 \
            elfutils \
            file \
            jq \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xvfb

      - name: Reverify release checkout
        run: node scripts/verify-release.mjs --tag "$RELEASE_TAG"
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and stage reviewed Linux FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          source_archive="$RUNNER_TEMP/ffmpeg-n8.1.2.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 --silent --show-error \
            "$FFMPEG_SOURCE_URL" --output "$source_archive"
          bash scripts/build-ffmpeg-linux.sh \
            --source-archive "$source_archive" \
            --expected-source-sha256 "$FFMPEG_SOURCE_SHA256" \
            --source-url "$FFMPEG_SOURCE_URL" \
            --source-revision "$FFMPEG_SOURCE_REVISION" \
            --build-id "$FFMPEG_BUILD_ID"

      - name: Build unsigned Linux Debian package
        run: pnpm tauri build --ci --bundles deb --no-sign

      - name: Stage, install, and verify Ubuntu 22.04+ Debian package
        shell: bash
        run: |
          set -euo pipefail
          deb="$(find src-tauri/target -type f -path '*/release/bundle/deb/*.deb' -print -quit)"
          [[ -n "$deb" ]] || { echo "Tauri did not produce a Debian package" >&2; exit 1; }
          mkdir -p "$RUNNER_TEMP/release-assets"
          formal_deb="$RUNNER_TEMP/release-assets/DOHC-Viewer_${{ needs.prepare.outputs.version }}_UNSIGNED_ubuntu-22.04+-x64.deb"
          install -m 0644 "$deb" "$formal_deb"
          bash scripts/verify-release-deb.sh \
            --deb "$formal_deb" \
            --version "${{ needs.prepare.outputs.version }}" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --commit "${{ needs.prepare.outputs.commit }}" \
            --output-directory "$RUNNER_TEMP/release-assets"

      - name: Attest Ubuntu deb provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release-assets/DOHC-Viewer_${{ needs.prepare.outputs.version }}_UNSIGNED_ubuntu-22.04+-x64.deb

      - name: Upload verified Ubuntu deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-ubuntu-deb-x64
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish complete GitHub Release
    needs: [prepare, windows, macos, linux_deb]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all verified platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/release-inputs
          merge-multiple: true

      - name: Assemble and cross-check complete release
        run: |
          node scripts/assemble-release.mjs \
            --input "$RUNNER_TEMP/release-inputs" \
            --output "$RUNNER_TEMP/release-assets" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --commit "${{ needs.prepare.outputs.commit }}"

      - name: Attest final release set
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release-assets/*

      - name: Publish only after every unsigned installer passed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          ASSET_DIR: ${{ runner.temp }}/release-assets
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$TAG" --json isDraft --jq .isDraft)"
            [[ "$is_draft" == "true" ]] || {
              echo "A published release already exists for immutable tag $TAG" >&2
              exit 1
            }
            while IFS= read -r existing_asset; do
              [[ -z "$existing_asset" ]] || gh release delete-asset "$TAG" "$existing_asset" --yes
            done < <(gh release view "$TAG" --json assets --jq '.assets[].name')
          else
            notes=$'WARNING: This release has no trusted publisher signature. Windows will show an unknown-publisher or SmartScreen warning. The macOS app has a valid local ad-hoc resource seal but no Developer ID or notarization, so first launch requires the standard System Settings > Privacy & Security > Open Anyway override. The Ubuntu deb package is unsigned; verify SHA256SUMS.txt before use.\n\nFour compiled installers are attached: Windows x64, macOS Apple Silicon, macOS Intel, and Ubuntu 22.04+ x86_64 deb. All four passed dependency, bundled-resource, install or mount, startup, and checksum gates before publication. The macOS jobs also passed strict nested-code/resource verification and a synthetic-quarantine policy check. A runner-only Internal Xprotect Error is accepted only when an independently built minimal control app produces the same result; this state is recorded in the verification report. Product-only XProtect errors and all structural signature errors block publication. Authenticode, Developer ID, Apple notarization, and trusted Linux package signing are intentionally not claimed.\n\nUser guide: https://github.com/${{ github.repository }}/wiki'
            create_args=("$TAG" --verify-tag --draft --title "DOHC Viewer $TAG (UNSIGNED)" --generate-notes --notes "$notes")
            if [[ "$PRERELEASE" == "true" ]]; then create_args+=(--prerelease); fi
            gh release create "${create_args[@]}"
          fi

          gh release upload "$TAG" "$ASSET_DIR"/* --clobber
          find "$ASSET_DIR" -maxdepth 1 -type f -exec basename {} \; | sort > "$RUNNER_TEMP/local-assets.txt"
          gh release view "$TAG" --json assets --jq '.assets[].name' | sort > "$RUNNER_TEMP/remote-assets.txt"
          diff -u "$RUNNER_TEMP/local-assets.txt" "$RUNNER_TEMP/remote-assets.txt"

          edit_args=("$TAG" --draft=false)
          if [[ "$PRERELEASE" != "true" ]]; then edit_args+=(--latest); fi
          gh release edit "${edit_args[@]}"
