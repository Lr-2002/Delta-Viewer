name: Linux package smoke

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/linux-package.yml"
      - "src-tauri/**"
      - "packaging/flatpak/**"
      - "scripts/build-ffmpeg-linux.sh"
      - "scripts/build-flatpak.sh"
      - "scripts/verify-release-deb.sh"
      - "scripts/verify-release-linux.sh"
      - "scripts/check-linux-package.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linux-package-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.12.1"
  RUST_VERSION: "1.97.1"
  FFMPEG_SOURCE_URL: https://codeload.github.com/FFmpeg/FFmpeg/tar.gz/refs/tags/n8.1.2
  FFMPEG_SOURCE_SHA256: 9fd092511605bbebafe095ea6d38d9e40f34d12f7386e1258372df8be0576eb7
  FFMPEG_SOURCE_REVISION: 38b88335f99e76ed89ff3c93f877fdefce736c13
  FFMPEG_BUILD_ID: ffmpeg-8.1.2-dohc-minimal-lgpl

jobs:
  deb:
    name: Ubuntu 22.04 deb smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Linux build and smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            dbus-x11 \
            elfutils \
            file \
            jq \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xvfb

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Linux packaging contract
        run: pnpm check:linux

      - name: Build and stage Linux FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          source_archive="$RUNNER_TEMP/ffmpeg-n8.1.2.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 --silent --show-error \
            "$FFMPEG_SOURCE_URL" --output "$source_archive"
          bash scripts/build-ffmpeg-linux.sh \
            --source-archive "$source_archive" \
            --expected-source-sha256 "$FFMPEG_SOURCE_SHA256" \
            --source-url "$FFMPEG_SOURCE_URL" \
            --source-revision "$FFMPEG_SOURCE_REVISION" \
            --build-id "$FFMPEG_BUILD_ID"

      - name: Build unsigned Debian package
        run: pnpm tauri build --ci --bundles deb --no-sign

      - name: Stage, install, and verify Debian package
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          commit="$(git rev-parse HEAD)"
          deb="$(find src-tauri/target -type f -path '*/release/bundle/deb/*.deb' -print -quit)"
          [[ -n "$deb" ]] || { echo "Tauri did not produce a Debian package" >&2; exit 1; }
          mkdir -p "$RUNNER_TEMP/release-assets"
          formal_deb="$RUNNER_TEMP/release-assets/DOHC-Viewer_${version}_UNSIGNED_ubuntu-22.04+-x64.deb"
          install -m 0644 "$deb" "$formal_deb"
          bash scripts/verify-release-deb.sh \
            --deb "$formal_deb" \
            --version "$version" \
            --tag "v$version" \
            --commit "$commit" \
            --output-directory "$RUNNER_TEMP/release-assets"

      - name: Upload Debian smoke evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-deb-smoke
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error
          retention-days: 14

  flatpak:
    name: Ubuntu 20.04+ Flatpak smoke
    needs: deb
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Flatpak and smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            dbus-x11 \
            elfutils \
            file \
            flatpak \
            flatpak-builder \
            jq \
            xvfb

      - name: Install GNOME 50 runtime and SDK
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user --noninteractive -y flathub org.gnome.Platform//50 org.gnome.Sdk//50

      - name: Download verified Debian smoke evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-deb-smoke
          path: ${{ runner.temp }}/deb-input

      - name: Build and verify Flatpak from verified Debian package
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          commit="$(git rev-parse HEAD)"
          deb="$RUNNER_TEMP/deb-input/DOHC-Viewer_${version}_UNSIGNED_ubuntu-22.04+-x64.deb"
          mkdir -p "$RUNNER_TEMP/release-assets"
          bundle="$RUNNER_TEMP/release-assets/DOHC-Viewer_${version}_UNSIGNED_ubuntu-x64.flatpak"
          bash scripts/build-flatpak.sh --deb "$deb" --version "$version" --output "$bundle"
          bash scripts/verify-release-linux.sh \
            --bundle "$bundle" \
            --version "$version" \
            --tag "v$version" \
            --commit "$commit" \
            --output-directory "$RUNNER_TEMP/release-assets"

      - name: Upload Flatpak smoke evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-flatpak-smoke
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error
          retention-days: 14
